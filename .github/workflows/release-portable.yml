name: Build portable release binary

# Triggers:
#   - Tag push matching v*: builds and attaches the binary to that release.
#   - Manual run from the Actions tab: builds and uploads as a workflow
#     artifact (handy for testing without cutting a real release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required for softprops/action-gh-release

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the nvCOMP tarball (~45 MB) across runs so we don't re-download
      # from NVIDIA's CDN every time.  Key includes the version so a bump
      # invalidates the cache automatically.
      - name: Cache nvCOMP tarball
        uses: actions/cache@v4
        with:
          path: ~/.cache/gzstd-build
          key: nvcomp-5.2.0.10-cuda12-${{ runner.os }}

      - name: Build portable binary
        run: |
          scripts/build-portable.sh
          # Files inside the bind-mounted build dir end up root-owned because
          # the docker container runs as root.  Reset ownership so subsequent
          # steps can read/move them.
          sudo chown -R "$(id -u):$(id -g)" build-portable/

      - name: Smoke test (CPU path only — no GPU, no driver on hosted runners)
        run: |
          # Hosted runners have NO NVIDIA driver — exactly the environment a
          # portable binary must support.  Since v0.13.55 NVML is dlopen'd at
          # runtime, so the binary must carry no DT_NEEDED on libnvidia-ml;
          # assert that here so a stub-linking regression fails the release.
          if ldd build-portable/gzstd | grep -q "libnvidia-ml"; then
            echo "ERROR: binary has a hard NVML dependency (DT_NEEDED" \
                 "libnvidia-ml) — it will not start on driver-less machines"
            ldd build-portable/gzstd
            exit 1
          fi

          # Runs directly, no LD_LIBRARY_PATH tricks: this is the real
          # driver-less user experience.
          ./build-portable/gzstd --version

          # CPU round-trip — exercises the dispatch and proves the binary
          # actually loads on a fresh Ubuntu 22.04 host (different glibc
          # than the build container's 20.04).
          echo "gzstd portable smoke test $(date)" > test.txt
          ./build-portable/gzstd --cpu-only -k -f test.txt
          ./build-portable/gzstd --cpu-only -d -k -f test.txt.zst -o test.recovered
          diff test.txt test.recovered
          rm -rf test.txt test.txt.zst test.recovered

      - name: Determine version + tag
        id: meta
        run: |
          # gzstd.cpp is the source of truth for the version string.
          version=$(grep -oP 'GZSTD_VERSION = "\K[0-9.]+' gzstd.cpp)
          # Use the pushed tag when triggered by tag, else synthesize from version.
          tag="${GITHUB_REF_NAME:-v$version}"
          if [[ "$tag" != "v$version" ]]; then
            echo "::warning::tag $tag does not match source version $version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Built version: $version (tag: $tag)"

      - name: Package
        id: package
        run: |
          # Outer filename is version-less so .../releases/latest/download/
          # gzstd-linux-x86_64.tar.gz stays stable across releases.  The
          # version is preserved inside (directory name + binary --version
          # output + LICENSE/CHANGELOG copies), so users can still audit
          # what they downloaded.
          inner="gzstd-${{ steps.meta.outputs.version }}-linux-x86_64"
          outer="gzstd-linux-x86_64.tar.gz"
          mkdir -p "release/$inner"
          cp build-portable/gzstd "release/$inner/"
          cp LICENSE CHANGELOG.md "release/$inner/"
          [ -f README.md ] && cp README.md "release/$inner/" || true
          cd release
          tar -czf "$outer" "$inner"
          sha256sum "$outer" > "${outer}.sha256"
          echo "tarball=release/${outer}" >> "$GITHUB_OUTPUT"
          echo "checksum=release/${outer}.sha256" >> "$GITHUB_OUTPUT"
          # The artifact name (workflow_dispatch path) keeps the version
          # so multiple manual runs don't collide.
          echo "artifact_name=$inner" >> "$GITHUB_OUTPUT"

      - name: Show release artifacts
        run: |
          ls -lh release/
          echo "---"
          cat release/*.sha256

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: release/

      - name: Attach to GitHub release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          generate_release_notes: true
          fail_on_unmatched_files: true
